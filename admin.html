<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publish — SCM Manifest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .form-wrap{ max-width: 720px; margin: 32px auto 64px; }
  .field{ margin-bottom: 18px; }
  .field label{
    display:block; font-family: var(--font-mono); font-size: 12px;
    color: var(--text-muted); margin-bottom: 6px; letter-spacing:0.03em;
  }
  .field input, .field select, .field textarea{
    width: 100%; background: var(--bg-panel); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-body); font-size: 14px;
    padding: 11px 14px; border-radius: var(--radius); outline: none;
  }
  .field textarea{ font-family: var(--font-mono); font-size: 13px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus{
    border-color: var(--amber); box-shadow: 0 0 0 3px rgba(240,167,63,0.15);
  }
  .row2{ display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .publish-btn{
    font-family: var(--font-display); font-weight: 600; font-size: 15px;
    padding: 13px 24px; border-radius: var(--radius); border: none;
    background: var(--amber); color: var(--bg); cursor: pointer;
  }
  .publish-btn:disabled{ opacity: 0.5; cursor: wait; }
  .status-msg{
    margin-top: 16px; font-family: var(--font-mono); font-size: 13px;
    padding: 12px 14px; border-radius: var(--radius); display:none;
  }
  .status-msg.show{ display:block; }
  .status-msg.ok{ background: rgba(79,184,166,0.1); color: var(--teal); border: 1px solid var(--teal-dim); }
  .status-msg.err{ background: rgba(224,103,79,0.1); color: var(--red); border: 1px solid var(--red); }
  .setup-box{
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px; margin-bottom: 28px; background: var(--bg-panel);
  }
  .setup-box p{ font-size: 13px; color: var(--text-muted); margin: 0 0 14px; }
  .setup-box.saved{ border-color: var(--teal-dim); }
  .forget-link{ font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); cursor: pointer; }
  .forget-link:hover{ color: var(--red); }
  h1.page-title{ font-family: var(--font-display); font-size: 24px; margin: 32px 0 6px; }
  .page-sub{ color: var(--text-muted); font-size: 13px; margin: 0 0 24px; }
</style>
</head>
<body>
  <div class="deckline" aria-hidden="true"></div>
  <header class="port-header">
    <div class="wrap port-header__inner">
      <a href="index.html" class="brand">
        <span class="brand__mark">⚓</span>
        <span class="brand__text">
          <span class="brand__title">SCM MANIFEST</span>
          <span class="brand__sub">Publish new entry</span>
        </span>
      </a>
      <a href="index.html" class="back-link" style="margin:0;">&larr; view manifest</a>
    </div>
  </header>

  <div class="wrap form-wrap">
    <h1 class="page-title">Log today's learning</h1>
    <p class="page-sub">Fill this in, hit publish — it commits straight to GitHub. Site updates in ~1 minute.</p>

    <div class="setup-box" id="setupBox">
      <p id="setupText">One-time setup: paste your GitHub details below. Saved only in this browser.</p>
      <div class="row2">
        <div class="field">
          <label for="ghOwner">MdRajon042</label>
          <input type="text" id="ghOwner" placeholder="e.g. aminul-rajon">
        </div>
        <div class="field">
          <label for="ghRepo">scm-manifest</label>
          <input type="text" id="ghRepo" placeholder="e.g. scm-manifest">
        </div>
      </div>
      <div class="field">
        <label for="ghToken">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</label>
        <input type="password" id="ghToken" placeholder="ghp_...">
      </div>
      <span class="forget-link" id="forgetLink">forget saved credentials</span>
    </div>

    <form id="postForm">
      <div class="field">
        <label for="title">Title</label>
        <input type="text" id="title" required placeholder="e.g. Bullwhip Effect — Why Demand Signals Distort Upstream">
      </div>
      <div class="row2">
        <div class="field">
          <label for="category">Category</label>
          <input type="text" id="category" required placeholder="e.g. Logistics / Procurement / Finance">
        </div>
        <div class="field">
          <label for="status">Status</label>
          <select id="status">
            <option value="in-transit">In progress (in-transit)</option>
            <option value="cleared">Understood (cleared)</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="tags">Tags (comma separated)</label>
        <input type="text" id="tags" placeholder="e.g. bullwhip-effect, demand-planning">
      </div>
      <div class="field">
        <label for="summary">One-line summary</label>
        <input type="text" id="summary" required placeholder="Shows in the list view">
      </div>
      <div class="field">
        <label for="content">Notes (Markdown supported — ## for headings, ** for bold, - for bullets)</label>
        <textarea id="content" rows="12" required placeholder="## What I learned&#10;&#10;Write freely here..."></textarea>
      </div>
      <button type="submit" class="publish-btn" id="publishBtn">Publish entry</button>
      <div class="status-msg" id="statusMsg"></div>
    </form>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
